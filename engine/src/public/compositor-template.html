<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stash Live Compositor Template</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="compositor-stage">
    
    <!-- Premium Glassmorphic Card Container -->
    <div id="visual-card" class="overlay-card">
      <div class="card-header">
        <p id="card-subtitle" class="card-subtitle">PRE-WARMING ASSETS</p>
        <h1 id="card-title" class="card-title">Orchestrating...</h1>
      </div>
      <div id="card-content" class="card-content">
        <!-- Rendered component will go here -->
      </div>
    </div>

    <!-- Active Stream Watermark -->
    <div class="engine-watermark">
      <span style="display:inline-block; width: 6px; height: 6px; background:#059669; border-radius:50%; box-shadow: 0 0 8px #059669;"></span>
      Stash Live Engine
    </div>

  </div>

  <script>
    const card = document.getElementById('visual-card');
    const titleEl = document.getElementById('card-title');
    const subtitleEl = document.getElementById('card-subtitle');
    const contentEl = document.getElementById('card-content');
    
    let currentAnchor = '';

    /**
     * Pre-warms the canvas in a translucent ghost state 1.5s ahead of intent resolution
     */
    function preWarm(anchor) {
      if (currentAnchor === anchor) return; // already active
      
      card.className = 'overlay-card pre-warming';
      titleEl.innerText = 'Synchronizing...';
      subtitleEl.innerText = 'Pre-Warming ' + anchor.replace(/_/g, ' ').toUpperCase();
      contentEl.innerHTML = `
        <div style="display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:#5E5854;">
          <span style="display:inline-block; width:8px; height:8px; border:2px solid #059669; border-radius:50%; border-top-color:transparent; animation:spin 1s linear infinite;"></span>
          Pre-fetching properties from Notion...
        </div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      `;
      console.log(`[Compositor Template] Pre-warmed anchor: ${anchor}`);
    }

    /**
     * Renders visual components based on cached Notion structural data
     */
    function showCard(anchor, dataStr) {
      const data = JSON.parse(dataStr);
      currentAnchor = anchor;
      
      titleEl.innerText = data.title;
      subtitleEl.innerText = data.type.replace(/_/g, ' ').toUpperCase() + ' SYNC';
      
      contentEl.innerHTML = ''; // clear

      if (data.type === 'graph') {
        renderGraph(data.data || []);
      } else if (data.type === 'image') {
        renderImage(data.url);
      } else if (data.type === 'text_card') {
        renderTextCard(data.body);
      }

      card.className = 'overlay-card active';
      console.log(`[Compositor Template] Displaying anchor: ${anchor}`);
    }

    /**
     * Dismisses the card
     */
    function hideCard() {
      card.className = 'overlay-card';
      currentAnchor = '';
      console.log(`[Compositor Template] Card dismissed`);
    }

    // Render rounded gradient bar graph using SVG
    function renderGraph(items) {
      if (items.length === 0) return;

      const width = 356;
      const height = 150;
      const padding = { top: 20, right: 10, bottom: 25, left: 45 };

      // Find max value for scaling
      const maxVal = Math.max(...items.map(d => d.value)) * 1.15;

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', '100%');
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.style.overflow = 'visible';

      // Define gradient and drop-shadow definitions
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      defs.innerHTML = `
        <linearGradient id="mint-gradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#059669" stop-opacity="0.85" />
          <stop offset="100%" stop-color="#10B981" stop-opacity="0.15" />
        </linearGradient>
      `;
      svg.appendChild(defs);

      // Draw grid lines
      const gridCounts = 3;
      for (let i = 0; i <= gridCounts; i++) {
        const y = padding.top + (i * (height - padding.top - padding.bottom)) / gridCounts;
        
        // Gridline line path
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', padding.left);
        line.setAttribute('y1', y);
        line.setAttribute('x2', width - padding.right);
        line.setAttribute('y2', y);
        line.setAttribute('stroke', 'rgba(26, 21, 18, 0.04)');
        line.setAttribute('stroke-dasharray', '2,2');
        svg.appendChild(line);

        // Grid value label
        const gridVal = Math.round(maxVal - (i * maxVal) / gridCounts);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', padding.left - 12);
        text.setAttribute('y', y + 3);
        text.setAttribute('text-anchor', 'end');
        text.setAttribute('class', 'axis-text');
        text.textContent = gridVal >= 1000 ? '$' + (gridVal / 1000) + 'k' : '$' + gridVal;
        svg.appendChild(text);
      }

      // Draw bars
      const barWidth = 48;
      const chartWidth = width - padding.left - padding.right;
      const step = chartWidth / items.length;

      items.forEach((item, index) => {
        const x = padding.left + (index * step) + (step - barWidth) / 2;
        const barHeight = ((item.value) / maxVal) * (height - padding.top - padding.bottom);
        const y = height - padding.bottom - barHeight;

        // Bar rect with gradient fill (contains corner rounding rx, ry)
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', x);
        rect.setAttribute('y', y);
        rect.setAttribute('width', barWidth);
        rect.setAttribute('height', barHeight);
        rect.setAttribute('rx', '8');
        rect.setAttribute('ry', '8');
        rect.setAttribute('class', 'bar-rect');
        svg.appendChild(rect);

        // Thin high-contrast mint highlight border
        const rectBorder = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rectBorder.setAttribute('x', x);
        rectBorder.setAttribute('y', y);
        rectBorder.setAttribute('width', barWidth);
        rectBorder.setAttribute('height', barHeight);
        rectBorder.setAttribute('rx', '8');
        rectBorder.setAttribute('ry', '8');
        rectBorder.setAttribute('class', 'bar-border');
        svg.appendChild(rectBorder);

        // Value text (JetBrains Mono)
        const valText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        valText.setAttribute('x', x + barWidth / 2);
        valText.setAttribute('y', y - 8);
        valText.setAttribute('text-anchor', 'middle');
        valText.setAttribute('class', 'value-label');
        valText.textContent = item.value >= 1000 ? `$${item.value / 1000}k` : item.value;
        svg.appendChild(valText);

        // X Axis label (Plus Jakarta Sans)
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', x + barWidth / 2);
        label.setAttribute('y', height - padding.bottom + 18);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('class', 'axis-text');
        label.style.fontWeight = '700';
        label.style.fill = '#1A1512';
        label.textContent = item.month;
        svg.appendChild(label);
      });

      const container = document.createElement('div');
      container.className = 'graph-container';
      container.appendChild(svg);
      contentEl.appendChild(container);
    }

    // Render image component
    function renderImage(url) {
      const container = document.createElement('div');
      container.className = 'image-layout';
      
      const img = document.createElement('img');
      img.src = url;
      img.alt = 'Sync Data Visualization';
      img.onerror = () => {
        img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="60" viewBox="0 0 100 60"><rect width="100" height="60" fill="%23FBF9F6"/><text x="50" y="35" font-family="sans-serif" font-size="6" fill="%235A5550" text-anchor="middle">Image Not Found</text></svg>';
      };

      container.appendChild(img);
      contentEl.appendChild(container);
    }

    // Render text card compliance standards
    function renderTextCard(bodyText) {
      const container = document.createElement('div');
      container.className = 'trust-badge-container';

      // Trust badge mint solid
      const badge = document.createElement('div');
      badge.className = 'trust-badge';
      badge.innerHTML = `
        <span class="pulse-dot"></span>
        VERIFIED TRIPLE ENCRYPTED
      `;

      const body = document.createElement('p');
      body.className = 'badge-body';
      body.innerText = bodyText;

      container.appendChild(badge);
      container.appendChild(body);
      contentEl.appendChild(container);
    }
  </script>
</body>
</html>
